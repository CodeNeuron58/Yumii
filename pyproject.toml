[project]
name = "yumi"
version = "0.1.0"
description = "Yumi - Your AI Companion"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "appdirs>=1.4.4",
    "elevenlabs>=2.38.1",
    "fastapi>=0.135.1",
    "faster-whisper>=1.2.1",
    "langchain>=1.2.18",
    "langchain-core>=1.2.17",
    "langchain-groq>=1.1.2",
    "langgraph>=1.0.10",
    "numpy>=2.4.2",
    "pydantic>=2.12.5",
    "pydantic-settings>=2.14.0",
    "python-dotenv>=1.0.1",
    "questionary>=2.0.1",
    "rich>=15.0.0",
    "sounddevice>=0.5.5",
    "typer>=0.25.1",
    "uvicorn>=0.41.0",
    "webrtcvad-wheels>=2.0.14",
    "websockets>=16.0",
]

[project.optional-dependencies]
dev = [
    "jupyter>=1.1.1"
]

[project.scripts]
yumi = "yumi.cli:app"
