<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yumi Live2D Console</title>
    <!-- Load PixiJS -->
    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/6.5.2/browser/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/cubism4.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1e1e2e;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            height: 100vh;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        #ui-layer {
            position: relative;
            z-index: 10;
            width: 80%;
            max-width: 800px;
            margin-bottom: 50px;
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
        }

        #subtitle {
            font-size: 24px;
            line-height: 1.4;
            font-weight: 500;
        }

        #btn-start {
            position: absolute;
            z-index: 20;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 30px;
            font-size: 20px;
            background-color: #ff79c6;
            color: #282a36;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 121, 198, 0.4);
        }

        #btn-start:hover {
            background-color: #ff92d0;
        }

        #debug-info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #0f0;
            font-family: monospace;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 5px;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>

<body>

    <div id="debug-info">Waiting for backend data...</div>
    <div id="canvas-container"></div>

    <button id="btn-start">Connect & Start Audio Context</button>

    <div id="ui-layer">
        <div id="subtitle">Connecting to Yumi...</div>
    </div>

    <script>
        const modelUrl = "../10an_culture_t01.model3.json";
        let live2dModel = null;
        let audioContext = null;
        let analyser = null;
        let socket = null;

        // --- EMOTION/MOTION HANDLING (Step 4) ---
        // Instead of hardcoded face/body mappings that override each other, we map the LLM's
        // "expression" string into one of the 4 native style "prefixes" that the Live2D model supports.
        const STYLE_PREFIXES = {
            "smile": "happy",
            "angry": "normal", // Some angry motions are under "normal"
            "sad": "normal",   // Normal sad
            "surprise": "cute",// Cute surprise motions
            "scared": "normal",
            "shy": "cute",
            "normal": "normal"
        };
        
        // Face fallbacks if a combined body motion doesn't exist
        const FACE_FALLBACKS = {
            "smile": "face_smile_01",
            "angry": "face_angry_01",
            "sad": "face_sad_01",
            "surprise": "face_surprise_01",
            "scared": "face_scared_01",
            "shy": "face_shy_01"
        };

        // --- PixiJS & Live2D Setup ---
        const app = new PIXI.Application({
            view: document.createElement('canvas'),
            transparent: true,
            autoDensity: true,
            resizeTo: window
        });

        // Prevent all global Pixi interactions from propagating to elements
        app.renderer.plugins.interaction.destroy();

        document.getElementById('canvas-container').appendChild(app.view);

        async function initLive2D() {
            try {
                // Load the model
                live2dModel = await PIXI.live2d.Live2DModel.from(modelUrl);
                app.stage.addChild(live2dModel);

                // We dynamically initialize face fallbacks in the motion manager, as 
                // the raw files are now exposed natively in the model file but lack explicit Groups.
                for (let key in FACE_FALLBACKS) {
                    const group = FACE_FALLBACKS[key];
                    if (!live2dModel.internalModel.motionManager.motionGroups[group]) {
                        live2dModel.internalModel.motionManager.motionGroups[group] = [{ file: `motions/${group}.motion3.json` }];
                    }
                }
                const unscaledWidth = live2dModel.internalModel.width;
                const unscaledHeight = live2dModel.internalModel.height;
                const scaleX = window.innerWidth / unscaledWidth;
                const scaleY = window.innerHeight / unscaledHeight;

                // Scale so that it strictly fits within the screen height
                const scale = Math.min(scaleX, scaleY) * 0.95;
                live2dModel.scale.set(scale);

                // Center Horizontally, Align to Bottom Vertically
                live2dModel.x = (window.innerWidth - (unscaledWidth * scale)) / 2;
                live2dModel.y = (window.innerHeight - (unscaledHeight * scale));

                // Properly disable mouse tracking in pixi-live2d-display
                live2dModel.pointerTracking = false;

                // If it STILL tracks, force the focus controller to center
                if (live2dModel.internalModel.focusController) {
                    live2dModel.internalModel.focusController.focus(0, 0);
                }

                console.log("Model loaded successfully.");

                // Play initial startup motion
                try {
                    live2dModel.motion("w-cool-posenod03");
                } catch (e) {
                    console.error("Failed to play startup motion:", e);
                }

            } catch (err) {
                console.error("Error loading Live2D model:", err);
                document.getElementById('subtitle').innerText = "Error loading Live2D model! Check console.";
                document.getElementById('ui-layer').style.opacity = 1;
            }
        }

        // --- WebSocket & Lip Sync Setup ---
        function initWebSocket() {
            socket = new WebSocket("ws://localhost:8000/ws");

            socket.onopen = () => {
                console.log("Connected to Python backend.");
                document.getElementById('subtitle').innerText = "Listening...";
                document.getElementById('ui-layer').style.opacity = 0; // Hide until spoken to
            };

            socket.onmessage = async (event) => {
                const data = JSON.parse(event.data);
                console.log("Received AI payload:", data);

                // 1. Show Subtitle
                document.getElementById('subtitle').innerText = data.text;
                document.getElementById('ui-layer').style.opacity = 1;

                // --- EMOTION/MOTION HANDLING (Step 5) ---
                // We combine the expression (e.g., "smile") and motion (e.g., "nod") into a single sequence if possible.
                // Priority 1: Play a combined sequence (e.g., "w-happy-nod01") 
                // Priority 2: Play the fallback expression ONLY (e.g., "face_smile_01")
                // Priority 3: Play a normal motion (e.g., "w-normal-nod01")
                
                let rawExp = data.expression?.toLowerCase() || "normal";
                let rawMot = data.motion?.toLowerCase() || "idle";
                
                let style = STYLE_PREFIXES[rawExp] || "normal";
                
                // Construct the combined name. Live2D names use e.g. "w-happy-nod01" or "w-normal-angry01"
                let combinedMotionName = `w-${style}-${rawMot}01`;
                
                // Exception handling since some emotions are mapped as primary body actions in this model:
                if (rawMot === "idle" && rawExp !== "normal") {
                     combinedMotionName = `w-${style}-${rawExp}01`;
                }

                try {
                    // Try to play the combined motion natively defined in the model JSON
                    if (live2dModel.internalModel.motionManager.motionGroups[combinedMotionName]) {
                        console.log(`Playing combined motion: ${combinedMotionName}`);
                        document.getElementById('debug-info').innerText = `[LLM: ${rawExp} | ${rawMot}]\nPlaying COMBINED: ${combinedMotionName}`;
                        live2dModel.motion(combinedMotionName);
                    } 
                    // Fallback to standalone face expression if the combined group does not exist
                    else if (FACE_FALLBACKS[rawExp]) {
                        console.log(`Fallback: Playing face motion ${FACE_FALLBACKS[rawExp]}`);
                        
                        // We do NOT play a body motion here by default, because it overrides the face.
                        // However, some body motions like "lookaway" or "fidget" only exist in "normal"
                        if (rawMot === "lookaway" || rawMot === "fidget" || rawMot === "greeting") {
                             let normalMotion = `w-normal-${rawMot}01`;
                             
                             if (live2dModel.internalModel.motionManager.motionGroups[normalMotion]) {
                                 // To get the face to stick, we play the body motion first, then the face
                                 document.getElementById('debug-info').innerText = `[LLM: ${rawExp} | ${rawMot}]\nMissing combo ${combinedMotionName}!\nFallback BODY: ${normalMotion}\nFallback FACE: ${FACE_FALLBACKS[rawExp]}`;
                                 
                                 // Play body first, wait ~100ms, then force face to override the top layer
                                 live2dModel.motion(normalMotion);
                                 setTimeout(() => live2dModel.motion(FACE_FALLBACKS[rawExp]), 150);
                             } else {
                                 document.getElementById('debug-info').innerText = `[LLM: ${rawExp} | ${rawMot}]\nMissing combo ${combinedMotionName}!\nFallback EXPRESSION ONLY: ${FACE_FALLBACKS[rawExp]}`;
                                 live2dModel.motion(FACE_FALLBACKS[rawExp]);
                             }
                        } 
                        else if (rawMot !== "idle" && rawMot !== "normal") {
                             document.getElementById('debug-info').innerText = `[LLM: ${rawExp} | ${rawMot}]\nMissing combo ${combinedMotionName}!\nFallback EXPRESSION: ${FACE_FALLBACKS[rawExp]}\n(Body motion skipped to preserve face)`;
                             live2dModel.motion(FACE_FALLBACKS[rawExp]);
                        } else {
                             document.getElementById('debug-info').innerText = `[LLM: ${rawExp} | ${rawMot}]\nMissing combo ${combinedMotionName}!\nFallback EXPRESSION ONLY: ${FACE_FALLBACKS[rawExp]}`;
                             live2dModel.motion(FACE_FALLBACKS[rawExp]);
                        }
                    }
                    // Final fallback: play generic normal motion
                    else if (rawMot !== "idle") {
                         let normalMotion = `w-normal-${rawMot}01`;
                         if (live2dModel.internalModel.motionManager.motionGroups[normalMotion]) {
                             document.getElementById('debug-info').innerText = `[LLM: ${rawExp} | ${rawMot}]\nPlaying FALLBACK MOTION: ${normalMotion}`;
                             live2dModel.motion(normalMotion);
                         } else {
                             document.getElementById('debug-info').innerText = `[LLM: ${rawExp} | ${rawMot}]\nAll motions missing!`;
                         }
                    } else {
                         document.getElementById('debug-info').innerText = `[LLM: ${rawExp} | ${rawMot}]\nNo valid motions to play... idle loop.`;
                    }
                } catch (e) { 
                    console.error("Motion error:", e);
                    document.getElementById('debug-info').innerText += `\nError: ${e.message}`;
                }

                // 3. Play Audio and Auto-Lip Sync
                if (data.audio) {
                    await playAudioAndSyncLips(data.audio);

                    setTimeout(() => {
                        document.getElementById('ui-layer').style.opacity = 0;
                    }, 500);
                }
            };

            socket.onclose = () => {
                console.log("Disconnected. Reconnecting in 3s...");
                setTimeout(initWebSocket, 3000);
            };
        }

        async function playAudioAndSyncLips(base64Audio) {
            if (!audioContext) return;

            const binaryString = window.atob(base64Audio);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }

            const audioBuffer = await audioContext.decodeAudioData(bytes.buffer);
            const source = audioContext.createBufferSource();
            source.buffer = audioBuffer;

            source.connect(analyser);
            analyser.connect(audioContext.destination);

            source.start(0);

            const pcmData = new Float32Array(analyser.fftSize);

            const lipSyncLoop = () => {
                if (!live2dModel) return;

                analyser.getFloatTimeDomainData(pcmData);
                let sumSquares = 0.0;
                for (const amplitude of pcmData) {
                    sumSquares += amplitude * amplitude;
                }
                const rms = Math.sqrt(sumSquares / pcmData.length);

                const mouthOpen = Math.min(1.0, rms * 15.0);
                live2dModel.internalModel.coreModel.setParameterValueById("ParamMouthOpenY", mouthOpen);

                if (source.playbackRate.value > 0) {
                    requestAnimationFrame(lipSyncLoop);
                }
            };

            requestAnimationFrame(lipSyncLoop);

            return new Promise(resolve => {
                source.onended = () => {
                    live2dModel.internalModel.coreModel.setParameterValueById("ParamMouthOpenY", 0);
                    resolve();
                };
            });
        }

        document.getElementById('btn-start').addEventListener('click', () => {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 512;

            document.getElementById('btn-start').style.display = 'none';
            initLive2D();
            initWebSocket();
        });

        // Window resize handler
        window.addEventListener('resize', () => {
            if (live2dModel) {
                const unscaledWidth = live2dModel.internalModel.width;
                const unscaledHeight = live2dModel.internalModel.height;
                const scaleX = window.innerWidth / unscaledWidth;
                const scaleY = window.innerHeight / unscaledHeight;

                const scale = Math.min(scaleX, scaleY) * 0.95;
                live2dModel.scale.set(scale);

                live2dModel.x = (window.innerWidth - (unscaledWidth * scale)) / 2;
                live2dModel.y = (window.innerHeight - (unscaledHeight * scale));
            }
        });
    </script>
</body>

</html>
