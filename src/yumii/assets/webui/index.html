<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yumii</title>

    <style>
        :root {
            /* Yumii brand palette (matches the CLI) */
            --c-primary: #00d4aa;
            --c-neon: #00ff88;
            --c-cyan: #00b8d4;
            --c-text: #e6f1f0;
            --c-dim: #9aa7a5;

            /* Orb gradient stops — recoloured per emotion by setOrbColor() */
            --orb-c1: #00ff88;
            --orb-c2: #00b8d4;
            /* Speaking amplitude 0..1, written by the RMS pulse loop */
            --amp: 0;
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            /* Transparent so the Tauri window shows only the orb + card.
               In a normal browser this just falls back to the page default. */
            background: transparent;
            color: var(--c-text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            user-select: none;
        }

        /* ── Stage: orb pinned near the top, card below it ─────────────── */
        #stage {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 48px;
            box-sizing: border-box;
        }

        /* ── The orb ───────────────────────────────────────────────────── */
        #orb-wrap {
            position: relative;
            width: 140px;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        #orb {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background: radial-gradient(circle at 32% 28%,
                var(--orb-c1) 0%,
                var(--orb-c2) 70%,
                rgba(0, 0, 0, 0.25) 100%);
            box-shadow:
                0 0 24px 4px color-mix(in srgb, var(--orb-c1) 55%, transparent),
                0 0 60px 12px color-mix(in srgb, var(--orb-c2) 35%, transparent);
            /* Base scale reacts to speaking amplitude */
            transform: scale(calc(1 + var(--amp) * 0.22));
            transition: transform 0.06s linear, box-shadow 0.25s ease, background 0.4s ease;
            will-change: transform;
        }

        /* Expanding ring used by listening / thinking states */
        #orb-wrap::after {
            content: "";
            position: absolute;
            width: 96px;
            height: 96px;
            border-radius: 50%;
            border: 2px solid color-mix(in srgb, var(--orb-c1) 60%, transparent);
            opacity: 0;
            pointer-events: none;
        }

        /* Idle — gentle breathing */
        #stage[data-state="idle"] #orb { animation: breathe 3.6s ease-in-out infinite; }
        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50%      { transform: scale(1.05); }
        }

        /* Boot — dim, slow pulse while the brain wakes up */
        #stage[data-state="boot"] #orb { opacity: 0.45; animation: breathe 2s ease-in-out infinite; }

        /* Listening — expanding ring */
        #stage[data-state="listening"] #orb-wrap::after { animation: ring 1.3s ease-out infinite; }
        @keyframes ring {
            0%   { opacity: 0.6; transform: scale(1); }
            100% { opacity: 0;   transform: scale(1.6); }
        }

        /* Thinking — rotating shimmer ring */
        #stage[data-state="thinking"] #orb-wrap::after {
            opacity: 1;
            border-color: transparent;
            border-top-color: var(--orb-c1);
            border-right-color: var(--orb-c2);
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Subtitle / transcript card ────────────────────────────────── */
        #card {
            margin-top: 26px;
            max-width: 320px;
            width: 80vw;
            background: rgba(16, 20, 26, 0.82);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 14px;
            padding: 14px 18px;
            font-size: 16px;
            line-height: 1.5;
            text-align: center;
            backdrop-filter: blur(8px);
            box-shadow: 0 6px 26px rgba(0, 0, 0, 0.45);
            opacity: 0;
            transition: opacity 0.25s ease;
            pointer-events: none;
        }
        #card.visible { opacity: 1; }

        /* ── Tiny hint under the orb ───────────────────────────────────── */
        #hint {
            margin-top: 14px;
            font-size: 13px;
            color: var(--c-dim);
            transition: opacity 0.25s ease;
        }

        /* ── Status pill (top center) ──────────────────────────────────── */
        #status-bar {
            position: absolute;
            z-index: 15;
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 13px;
            color: rgba(255, 255, 255, 0.85);
            background: rgba(0, 0, 0, 0.45);
            padding: 5px 14px;
            border-radius: 999px;
            backdrop-filter: blur(4px);
            opacity: 0;
            transition: opacity 0.2s ease-in-out;
            pointer-events: none;
            white-space: nowrap;
        }
        #status-bar.visible { opacity: 1; }

        /* ── Mode menu (gear) ──────────────────────────────────────────── */
        #gear {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 20;
            width: 30px;
            height: 30px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: var(--c-dim);
            background: rgba(255, 255, 255, 0.05);
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.2s ease, background 0.2s ease;
        }
        #gear:hover { opacity: 1; background: rgba(255, 255, 255, 0.12); }

        #mode-menu {
            position: absolute;
            top: 48px;
            right: 12px;
            z-index: 20;
            background: rgba(16, 20, 26, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 6px;
            min-width: 190px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
        }
        #mode-menu.hidden { display: none; }
        .mode-item {
            padding: 9px 12px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }
        .mode-item:hover { background: rgba(255, 255, 255, 0.06); }
        .mode-item .tag { color: var(--c-primary); font-size: 12px; }
        .mode-item .soon { color: var(--c-dim); font-size: 12px; }

        /* ── Modal cards (coming-soon + confirm) ───────────────────────── */
        .modal {
            position: absolute;
            z-index: 30;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(18, 22, 30, 0.96);
            color: #fff;
            padding: 22px 24px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            min-width: 260px;
            max-width: 86vw;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .modal.hidden { display: none; }
        .modal h3 { margin: 0 0 8px; font-size: 17px; color: var(--c-primary); }
        .modal p { margin: 0 0 16px; font-size: 14px; line-height: 1.5; color: var(--c-text); }
        .modal button {
            padding: 8px 18px;
            border-radius: 9px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            cursor: pointer;
            font-size: 14px;
        }
        .modal button:hover { background: rgba(255, 255, 255, 0.16); }
        .confirm-buttons { display: flex; gap: 10px; justify-content: center; }
        #confirm-yes { background: rgba(0, 212, 170, 0.22); border-color: rgba(0, 212, 170, 0.5); }
        #confirm-yes:hover { background: rgba(0, 212, 170, 0.38); }
    </style>
</head>

<body>
    <!-- Whole surface is draggable in Tauri; ignored in a browser. -->
    <div id="gear" title="Mode">⚙</div>

    <div id="mode-menu" class="hidden">
        <div class="mode-item" data-mode="orb">
            <span>Orb</span><span class="tag">active</span>
        </div>
        <div class="mode-item" data-mode="companion">
            <span>Companion (avatar)</span><span class="soon">soon</span>
        </div>
    </div>

    <div id="status-bar"></div>

    <div id="stage" data-state="boot" data-tauri-drag-region>
        <div id="orb-wrap" data-tauri-drag-region>
            <div id="orb"></div>
        </div>
        <div id="hint">Waking Yumii up…</div>
        <div id="card"></div>
    </div>

    <!-- Companion "coming soon" -->
    <div id="soon-modal" class="modal hidden">
        <h3>Companion mode — coming soon</h3>
        <p>An animated avatar you can watch react in real time is on the way.
           For now, meet Yumii as an orb.</p>
        <button id="soon-close">Got it</button>
    </div>

    <!-- HITL tool confirmation -->
    <div id="confirm-prompt" class="modal hidden">
        <p class="confirm-text"></p>
        <div class="confirm-buttons">
            <button id="confirm-no">Deny</button>
            <button id="confirm-yes">Approve</button>
        </div>
    </div>

    <script>
        // ── Environment: browser vs Tauri desktop shell ────────────────
        const IS_TAURI = !!(window.__TAURI__ || window.__TAURI_INTERNALS__);
        const HTTP_BASE = IS_TAURI ? 'http://127.0.0.1:8000' : '';
        const WS_URL = IS_TAURI ? 'ws://127.0.0.1:8000/ws' : `ws://${window.location.host}/ws`;

        // ── Shared audio / socket state (unchanged from the Live2D build) ─
        let audioContext = null;
        let analyser = null;
        let socket = null;
        let currentAudioSource = null;
        let micStream = null;
        let micProcessor = null;
        let audioByteRemainder = new Uint8Array(0); // Buffer for odd-sized chunks
        let started = false;

        // ── Orb state machine ──────────────────────────────────────────
        const stage = document.getElementById('stage');
        const orb = document.getElementById('orb');
        const hintEl = document.getElementById('hint');
        const cardEl = document.getElementById('card');

        let orbState = 'boot';   // boot | idle | listening | thinking | speaking
        function setOrbState(s) {
            orbState = s;
            stage.setAttribute('data-state', s);
            if (s !== 'speaking') orb.style.setProperty('--amp', 0);
        }

        // Map the backend's emotion label onto the orb's gradient colours.
        const ORB_COLORS = {
            smile:    ['#00ff88', '#00d4aa'],
            surprise: ['#ffe066', '#00b8d4'],
            sad:      ['#5b8cff', '#3a5bbf'],
            angry:    ['#ff6b6b', '#d64545'],
            scared:   ['#b57bff', '#7a4fd0'],
            shy:      ['#ff9ecb', '#ff79c6'],
            normal:   ['#00ff88', '#00b8d4'],
        };
        function setOrbColor(expression) {
            const [c1, c2] = ORB_COLORS[(expression || 'normal').toLowerCase()] || ORB_COLORS.normal;
            document.documentElement.style.setProperty('--orb-c1', c1);
            document.documentElement.style.setProperty('--orb-c2', c2);
        }

        function showCard(text) {
            cardEl.textContent = text;
            cardEl.classList.add('visible');
        }
        function hideCard() { cardEl.classList.remove('visible'); }

        // ── Mode menu + coming-soon ────────────────────────────────────
        const modeMenu = document.getElementById('mode-menu');
        document.getElementById('gear').addEventListener('click', (e) => {
            e.stopPropagation();
            modeMenu.classList.toggle('hidden');
        });
        document.addEventListener('click', () => modeMenu.classList.add('hidden'));
        modeMenu.addEventListener('click', (e) => e.stopPropagation());
        modeMenu.querySelectorAll('.mode-item').forEach((item) => {
            item.addEventListener('click', () => {
                modeMenu.classList.add('hidden');
                if (item.dataset.mode === 'companion') {
                    document.getElementById('soon-modal').classList.remove('hidden');
                }
            });
        });
        document.getElementById('soon-close').addEventListener('click', () => {
            document.getElementById('soon-modal').classList.add('hidden');
        });

        // ── Microphone capture (16 kHz PCM16 → WebSocket) ──────────────
        // Identical to the Live2D build, plus a local RMS tick so the orb
        // can show a "listening" state while the user talks.
        async function initMicrophone() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
                });
                micStream = stream;

                const recContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                const source = recContext.createMediaStreamSource(stream);
                micProcessor = recContext.createScriptProcessor(4096, 1, 1);

                micProcessor.onaudioprocess = (e) => {
                    if (!socket || socket.readyState !== WebSocket.OPEN) return;
                    const inputData = e.inputBuffer.getChannelData(0);

                    // Local RMS → drive the "listening" cue (frontend only).
                    let sum = 0;
                    for (let i = 0; i < inputData.length; i++) sum += inputData[i] * inputData[i];
                    micEnergyTick(Math.sqrt(sum / inputData.length));

                    const pcm16 = new Int16Array(inputData.length);
                    for (let i = 0; i < inputData.length; i++) {
                        const s = Math.max(-1, Math.min(1, inputData[i]));
                        pcm16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                    }
                    socket.send(pcm16.buffer);
                };

                source.connect(micProcessor);
                micProcessor.connect(recContext.destination);
                console.log("Microphone initialized and streaming.");
            } catch (err) {
                console.error("Error initializing microphone:", err);
                hintEl.textContent = "🎙️ Mic error: " + err.message;
            }
        }

        // "Listening" cue: show it when local mic energy is up, but only
        // while idle/listening (backend thinking/speaking states win).
        const MIC_GATE = 0.02;
        let _listenHangover = null;
        function micEnergyTick(rms) {
            if (orbState !== 'idle' && orbState !== 'listening') return;
            if (rms > MIC_GATE) {
                if (orbState !== 'listening') setOrbState('listening');
                if (_listenHangover) clearTimeout(_listenHangover);
                _listenHangover = setTimeout(() => {
                    if (orbState === 'listening') setOrbState('idle');
                }, 600);
            }
        }

        // ── WebSocket + event routing ──────────────────────────────────
        function initWebSocket() {
            socket = new WebSocket(WS_URL);
            socket.binaryType = 'arraybuffer';

            socket.onopen = () => {
                console.log("Connected to Yumii backend.");
                hintEl.textContent = "Listening… just talk";
                setOrbState('idle');
            };

            let nextPlayTime = 0;
            let isStreaming = false;
            let scheduledSources = [];
            let currentSampleRate = 24000;

            // ── Status pill ────────────────────────────────────────────
            const statusBar = document.getElementById('status-bar');
            let _statusHideTimer = null;
            function setStatus(text) {
                if (!statusBar) return;
                if (_statusHideTimer) { clearTimeout(_statusHideTimer); _statusHideTimer = null; }
                if (text) {
                    statusBar.textContent = text;
                    statusBar.classList.add('visible');
                } else {
                    _statusHideTimer = setTimeout(() => {
                        statusBar.classList.remove('visible');
                        statusBar.textContent = '';
                    }, 250);
                }
            }

            function _humanToolName(name) {
                if (!name) return 'working';
                const map = {
                    get_current_time: 'Checking the time',
                    duckduckgo_results_json: 'Searching the web',
                    duckduckgo_search_results: 'Searching the web',
                    web_search: 'Searching the web',
                    web_search_results: 'Searching the web',
                };
                return map[name] || `Running ${name.replace(/_/g, ' ')}`;
            }

            // ── HITL confirmation prompt ────────────────────────────────
            const confirmPrompt = document.getElementById('confirm-prompt');
            const confirmText = confirmPrompt.querySelector('.confirm-text');
            function showConfirmPrompt(requestId, tool, args) {
                const pretty = _humanToolName(tool);
                const argStr = args && Object.keys(args).length ? ` with ${JSON.stringify(args)}` : '';
                confirmText.textContent = `Allow Yumii to ${pretty.toLowerCase()}${argStr}?`;
                confirmPrompt.classList.remove('hidden');
                const reply = (approved) => {
                    confirmPrompt.classList.add('hidden');
                    socket.send(JSON.stringify({ type: 'confirmation_response', request_id: requestId, approve: approved }));
                };
                document.getElementById('confirm-yes').onclick = () => reply(true);
                document.getElementById('confirm-no').onclick = () => reply(false);
            }

            function stopAllAudio() {
                if (currentAudioSource) {
                    try { currentAudioSource.stop(); } catch (e) {}
                    currentAudioSource = null;
                }
                scheduledSources.forEach(src => { try { src.stop(); } catch (e) {} });
                scheduledSources = [];
                isStreaming = false;
                nextPlayTime = 0;
            }

            // Orb pulse: read playback RMS and write --amp while speaking.
            let orbPulseReq = null;
            function startOrbPulse() {
                if (orbPulseReq) return;
                const pcm = new Float32Array(analyser.fftSize);
                const loop = () => {
                    if (orbState !== 'speaking') { orb.style.setProperty('--amp', 0); orbPulseReq = null; return; }
                    analyser.getFloatTimeDomainData(pcm);
                    let sum = 0;
                    for (const a of pcm) sum += a * a;
                    const rms = Math.sqrt(sum / pcm.length);
                    orb.style.setProperty('--amp', Math.min(1, rms * 14));
                    orbPulseReq = requestAnimationFrame(loop);
                };
                orbPulseReq = requestAnimationFrame(loop);
            }

            socket.onmessage = async (event) => {
                const data = JSON.parse(event.data);

                if (data.type === "interrupt") {
                    stopAllAudio();
                    hideCard();
                    setStatus('');
                    setOrbState('idle');
                    return;
                }

                if (data.type === "thinking_start" || data.type === "thinking_delta") {
                    setStatus('Thinking…');
                    if (orbState !== 'speaking') setOrbState('thinking');
                    return;
                }
                if (data.type === "thinking_end") { return; }
                if (data.type === "tool_status") {
                    if (data.status === "running") setStatus(`${_humanToolName(data.tool)}…`);
                    return;
                }

                if (data.type === "confirmation_request") {
                    showConfirmPrompt(data.request_id, data.tool, data.args || {});
                    return;
                }
                if (data.type === "confirmation_timeout") {
                    confirmPrompt.classList.add('hidden');
                    return;
                }

                if (data.error) {
                    showCard(`⚠️ ${data.error}`);
                    setOrbState('idle');
                    setTimeout(hideCard, 5000);
                    return;
                }

                // Live user transcription (word-by-word) from the streaming STT.
                // Only shown while she's idle/listening so it doesn't clobber
                // Yumii's own reply once she starts thinking/speaking.
                if (data.type === "partial_transcript") {
                    if (orbState === 'idle' || orbState === 'listening') {
                        setOrbState('listening');
                        if (data.text && data.text.trim()) showCard(data.text);
                    }
                    return;
                }

                // ── Streaming audio (ElevenLabs + CAMB.ai) ──────────────
                if (data.type === "audio_start") {
                    stopAllAudio();
                    isStreaming = true;
                    currentSampleRate = data.sampleRate || 24000;
                    nextPlayTime = audioContext.currentTime + 0.1;
                    setOrbColor(data.expression);
                    setOrbState('speaking');
                    showCard(data.text);
                    startOrbPulse();
                    return;
                }
                if (data.type === "audio_chunk") {
                    if (!isStreaming) return;
                    const float32Data = pcm16Base64ToFloat32(data.data);
                    if (float32Data.length === 0) return;

                    const audioBuffer = audioContext.createBuffer(1, float32Data.length, currentSampleRate);
                    audioBuffer.getChannelData(0).set(float32Data);

                    const src = audioContext.createBufferSource();
                    src.buffer = audioBuffer;
                    const gain = audioContext.createGain();
                    gain.gain.value = 0.7; // reduce mic bleed
                    src.connect(gain);
                    gain.connect(analyser);
                    analyser.connect(audioContext.destination);

                    if (nextPlayTime < audioContext.currentTime) nextPlayTime = audioContext.currentTime + 0.05;
                    src.start(nextPlayTime);
                    scheduledSources.push(src);
                    nextPlayTime += audioBuffer.duration;
                    src.onended = () => {
                        const idx = scheduledSources.indexOf(src);
                        if (idx > -1) scheduledSources.splice(idx, 1);
                    };
                    return;
                }
                if (data.type === "audio_end") {
                    const remaining = Math.max(0, nextPlayTime - audioContext.currentTime);
                    setTimeout(() => {
                        if (!isStreaming) return;
                        isStreaming = false;
                        setOrbState('idle');
                        hideCard();
                        setStatus('');
                    }, remaining * 1000 + 400);
                    return;
                }

                // ── Legacy non-streaming payload (kept for safety) ──────
                if (data.text) {
                    setOrbColor(data.expression);
                    showCard(data.text);
                    if (data.audio) {
                        await playAudioLegacy(data.audio);
                        setOrbState('idle');
                        setTimeout(hideCard, 400);
                    } else {
                        setOrbState('idle');
                        setTimeout(hideCard, 4000);
                    }
                }
            };

            socket.onclose = () => {
                console.log("Disconnected. Reconnecting in 3s…");
                setOrbState('boot');
                hintEl.textContent = "Reconnecting…";
                setTimeout(initWebSocket, 3000);
            };

            // expose the pulse starter to the legacy path
            window._startOrbPulse = startOrbPulse;
        }

        function pcm16Base64ToFloat32(base64) {
            const binary = window.atob(base64);
            const len = binary.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) bytes[i] = binary.charCodeAt(i);

            let totalBytes = new Uint8Array(audioByteRemainder.length + bytes.length);
            totalBytes.set(audioByteRemainder);
            totalBytes.set(bytes, audioByteRemainder.length);

            const numFullSamples = Math.floor(totalBytes.length / 2);
            const validBytes = totalBytes.subarray(0, numFullSamples * 2);
            audioByteRemainder = totalBytes.subarray(numFullSamples * 2);

            const int16 = new Int16Array(validBytes.buffer, validBytes.byteOffset, numFullSamples);
            const float32 = new Float32Array(int16.length);
            for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768.0;
            return float32;
        }

        // Legacy MP3 payload path (ElevenLabs/CAMB both stream today, so
        // this is effectively dead but harmless). Drives the orb pulse.
        async function playAudioLegacy(base64Audio) {
            if (!audioContext) return;
            const binary = window.atob(base64Audio);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);

            const audioBuffer = await audioContext.decodeAudioData(bytes.buffer);
            const src = audioContext.createBufferSource();
            src.buffer = audioBuffer;
            currentAudioSource = src;
            src.connect(analyser);
            analyser.connect(audioContext.destination);
            setOrbState('speaking');
            if (window._startOrbPulse) window._startOrbPulse();
            src.start(0);

            return new Promise(resolve => { src.onended = () => resolve(); });
        }

        // ── Boot: wait for the brain, then let the user tap to wake ────
        async function pollHealth() {
            for (;;) {
                try {
                    const r = await fetch(HTTP_BASE + '/health', { cache: 'no-store' });
                    if (r.ok) return;
                } catch (e) { /* server not up yet */ }
                await new Promise(res => setTimeout(res, 500));
            }
        }

        async function boot() {
            setOrbState('boot');
            hintEl.textContent = "Waking Yumii up…";
            await pollHealth();
            setOrbState('idle');
            hintEl.textContent = "Tap the orb to talk";
        }

        async function startSession() {
            if (started) return;
            started = true;
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 512;
            hintEl.textContent = "Connecting…";
            await initMicrophone();
            initWebSocket();
        }

        document.getElementById('orb-wrap').addEventListener('click', startSession);

        boot();
    </script>
</body>
