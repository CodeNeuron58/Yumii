<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yumii Live2D Console</title>
    <!-- Load PixiJS -->
    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/6.5.2/browser/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/cubism4.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1e1e2e;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            height: 100vh;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        #ui-layer {
            position: absolute;
            z-index: 10;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            width: 350px;
            max-width: 80vw;
            max-height: 80vh;
            overflow-y: auto;
            text-align: left;
            background: rgba(0, 0, 0, 0.6);
            padding: 25px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        #subtitle {
            font-size: 20px;
            line-height: 1.5;
            font-weight: 500;
        }

        #btn-start {
            position: absolute;
            z-index: 20;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 30px;
            font-size: 20px;
            background-color: #ff79c6;
            color: #282a36;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 121, 198, 0.4);
        }

        #btn-start:hover {
            background-color: #ff92d0;
        }

        #debug-info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #0f0;
            font-family: monospace;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 5px;
            pointer-events: none;
            z-index: 100;
        }

        /* ─── Session Picker ───────────────────────────────────────────── */
        #session-picker {
            position: absolute;
            z-index: 30;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(13, 17, 23, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        #session-picker.visible {
            opacity: 1;
            pointer-events: auto;
        }

        #session-picker h2 {
            color: #00d4aa;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .session-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 15px 20px;
            margin: 8px 0;
            width: 320px;
            cursor: pointer;
            transition: border-color 0.2s, transform 0.1s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .session-card:hover {
            border-color: #00d4aa;
            transform: translateX(4px);
        }

        .session-card .title {
            font-weight: 600;
            font-size: 16px;
        }

        .session-card .meta {
            font-size: 12px;
            color: #8b949e;
        }

        .btn-new-session {
            background: #00d4aa;
            color: #0d1117;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
            box-shadow: 0 4px 12px rgba(0, 212, 170, 0.3);
        }

        .btn-new-session:hover {
            background: #00ff88;
        }

        /* ─── Command Bar ────────────────────────────────────────────── */
        #command-bar {
            position: absolute;
            z-index: 25;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            align-items: center;
            gap: 8px;
            background: rgba(13, 17, 23, 0.85);
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #30363d;
        }

        #command-bar.visible {
            display: flex;
        }

        #command-input {
            background: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            width: 260px;
            outline: none;
        }

        #command-input:focus {
            border-color: #00d4aa;
        }

        .btn-command {
            background: #30363d;
            color: #c9d1d9;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        .btn-command:hover {
            background: #484f58;
        }

        #cmd-toggle {
            position: absolute;
            z-index: 25;
            bottom: 30px;
            right: 30px;
            background: rgba(13, 17, 23, 0.6);
            color: #8b949e;
            border: 1px solid #30363d;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }

        #cmd-toggle:hover {
            color: #00d4aa;
            border-color: #00d4aa;
        }
    </style>
</head>

<body>

    <div id="debug-info">Waiting for backend data...</div>
    <div id="canvas-container"></div>

    <button id="btn-start">Connect &amp; Start Audio Context</button>

    <div id="ui-layer">
        <div id="subtitle">Connecting to Yumii...</div>
    </div>

    <!-- Session Picker Overlay -->
    <div id="session-picker">
        <h2>Welcome to Yumii</h2>
        <button class="btn-new-session" id="btn-new-session">✨ New Chat</button>
        <div id="session-list"></div>
    </div>

    <!-- Command Bar -->
    <button id="cmd-toggle">⌨ Commands</button>
    <div id="command-bar">
        <input type="text" id="command-input" placeholder="/new, /resume, /name ..." autocomplete="off" />
        <button class="btn-command" id="btn-cmd-send">Send</button>
    </div>

    <script>
        // ─── LIVE2D MODEL CONFIGURATION ───
        // Resolved dynamically via /api/config now.
        let modelUrl = "/Yumii_Avatar/your-model.model3.json";
        let live2dModel = null;
        let audioContext = null;
        let analyser = null;
        let socket = null;
        let currentAudioSource = null;
        let micStream = null;
        let micProcessor = null;
        let audioByteRemainder = new Uint8Array(0);

        // ─── EMOTION/MOTION HANDLING ───
        const EXPRESSION_MAP = {
            "smile": "smile",
            "angry": "angry",
            "sad": "sad",
            "surprise": "surprise",
            "scared": "scared",
            "shy": "shy",
            "normal": null
        };

        const MOTION_MAP = {
            "nod": "nod",
            "shakehead": "shakehead",
            "tilthead": "nod",
            "fidget": "idle",
            "forward": "idle",
            "lookaway": "lookaway",
            "greeting": "greeting",
            "idle": "idle"
        };

        // ─── PixiJS & Live2D Setup ───
        const app = new PIXI.Application({
            view: document.createElement('canvas'),
            transparent: true,
            autoDensity: true,
            resizeTo: window
        });

        app.renderer.plugins.interaction.destroy();
        document.getElementById('canvas-container').appendChild(app.view);

        async function initLive2D() {
            try {
                live2dModel = await PIXI.live2d.Live2DModel.from(modelUrl);
                app.stage.addChild(live2dModel);

                const unscaledWidth = live2dModel.internalModel.width;
                const unscaledHeight = live2dModel.internalModel.height;
                const scaleX = window.innerWidth / unscaledWidth;
                const scaleY = window.innerHeight / unscaledHeight;

                const scale = Math.min(scaleX, scaleY) * 0.95;
                live2dModel.scale.set(scale);

                live2dModel.x = (window.innerWidth - (unscaledWidth * scale)) / 2;
                live2dModel.y = (window.innerHeight - (unscaledHeight * scale));

                live2dModel.pointerTracking = false;
                if (live2dModel.internalModel.focusController) {
                    live2dModel.internalModel.focusController.focus(0, 0);
                }

                console.log("Model loaded successfully.");
                try { live2dModel.motion("idle"); } catch (e) {}

            } catch (err) {
                console.error("Error loading Live2D model:", err);
                const sub = document.getElementById('subtitle');
                sub.innerHTML =
                    "⚠️ No avatar loaded.<br>" +
                    "Drop a Cubism 4 <code>.model3.json</code> into <code>~/.yumii/avatar/</code>.<br>" +
                    "Voice + LLM still work without an avatar.";
                document.getElementById('ui-layer').style.opacity = 1;
                document.getElementById('debug-info').innerText =
                    "Live2D model not found. Yumii will speak through your speakers; only the animated avatar is missing.";
            }
        }

        // ─── Config fetch ───
        async function fetchConfig() {
            try {
                const resp = await fetch('/api/config');
                const cfg = await resp.json();
                if (cfg.avatar_url) {
                    modelUrl = cfg.avatar_url;
                    console.log("Avatar URL resolved:", modelUrl);
                }
            } catch (e) {
                console.warn("Could not fetch /api/config, using fallback modelUrl");
            }
        }

        // ─── Session Picker ───
        async function loadSessionList() {
            try {
                const resp = await fetch('/api/sessions');
                const sessions = await resp.json();
                const list = document.getElementById('session-list');
                list.innerHTML = '';

                if (sessions.length === 0) {
                    list.innerHTML = '<div style="color:#8b949e;font-size:14px;">No previous chats yet.</div>';
                    return;
                }

                sessions.forEach(s => {
                    const card = document.createElement('div');
                    card.className = 'session-card';
                    card.innerHTML =
                        `<div>` +
                        `<div class="title">${escapeHtml(s.name)}</div>` +
                        `<div class="meta">${s.created_at.split('T')[0]} · ${s.message_count} messages</div>` +
                        `</div>`;
                    card.onclick = () => selectSession(s.id);
                    list.appendChild(card);
                });
            } catch (e) {
                console.error("Failed to load sessions:", e);
            }
        }

        function showSessionPicker() {
            document.getElementById('session-picker').classList.add('visible');
            loadSessionList();
        }

        function hideSessionPicker() {
            document.getElementById('session-picker').classList.remove('visible');
        }

        function selectSession(sessionId) {
            hideSessionPicker();
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({
                    type: 'session_select',
                    action: 'resume',
                    session_id: sessionId
                }));
            }
        }

        document.getElementById('btn-new-session').addEventListener('click', () => {
            hideSessionPicker();
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({
                    type: 'session_select',
                    action: 'new'
                }));
            }
        });

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ─── Command Bar ───
        const cmdToggle = document.getElementById('cmd-toggle');
        const cmdBar = document.getElementById('command-bar');
        const cmdInput = document.getElementById('command-input');
        const btnCmdSend = document.getElementById('btn-cmd-send');

        cmdToggle.addEventListener('click', () => {
            cmdBar.classList.toggle('visible');
            if (cmdBar.classList.contains('visible')) cmdInput.focus();
        });

        function sendCommand() {
            const text = cmdInput.value.trim();
            if (!text) return;
            cmdInput.value = '';
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({ type: 'command', command: text }));
            }
        }

        btnCmdSend.addEventListener('click', sendCommand);
        cmdInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendCommand();
            if (e.key === 'Escape') cmdBar.classList.remove('visible');
        });

        // ─── Microphone ───
        async function initMicrophone() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    }
                });
                micStream = stream;

                const recContext = new (window.AudioContext || window.webkitAudioContext)({
                    sampleRate: 16000,
                });

                const source = recContext.createMediaStreamSource(stream);
                micProcessor = recContext.createScriptProcessor(4096, 1, 1);

                micProcessor.onaudioprocess = (e) => {
                    if (!socket || socket.readyState !== WebSocket.OPEN) return;
                    const inputData = e.inputBuffer.getChannelData(0);
                    const pcm16 = new Int16Array(inputData.length);
                    for (let i = 0; i < inputData.length; i++) {
                        const s = Math.max(-1, Math.min(1, inputData[i]));
                        pcm16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                    }
                    socket.send(pcm16.buffer);
                };

                source.connect(micProcessor);
                micProcessor.connect(recContext.destination);

                document.getElementById('debug-info').innerText += `\n🎙️ Mic Active (16kHz)`;
                console.log("Microphone initialized and streaming.");
            } catch (err) {
                console.error("Error initializing microphone:", err);
                document.getElementById('debug-info').innerText += `\n❌ Mic Error: ${err.message}`;
            }
        }

        // ─── WebSocket ───
        let sessionReady = false;

        function initWebSocket() {
            socket = new WebSocket(`ws://${window.location.host}/ws`);
            socket.binaryType = 'arraybuffer';

            socket.onopen = () => {
                console.log("Connected to Python backend.");
                // Wait for backend to ask for session selection, or send default
                // The backend now expects the first message to be session_select.
                // If the picker is visible, the user will click a button to send it.
                // If we already have an active_session_id in localStorage, resume it.
                const lastSession = localStorage.getItem('yumii_last_session');
                if (lastSession) {
                    socket.send(JSON.stringify({
                        type: 'session_select',
                        action: 'resume',
                        session_id: lastSession
                    }));
                } else {
                    socket.send(JSON.stringify({
                        type: 'session_select',
                        action: 'new'
                    }));
                }
            };

            let nextPlayTime = 0;
            let isStreaming = false;
            let scheduledSources = [];
            let currentSampleRate = 24000;

            function stopAllAudio() {
                if (currentAudioSource) {
                    try { currentAudioSource.stop(); } catch (e) {}
                    currentAudioSource = null;
                }
                scheduledSources.forEach(src => {
                    try { src.stop(); } catch (e) {}
                });
                scheduledSources = [];
                isStreaming = false;
                nextPlayTime = 0;

                if (live2dModel) {
                    live2dModel.internalModel.coreModel.setParameterValueById('ParamMouthOpenY', 0);
                }
            }

            socket.onmessage = async (event) => {
                const data = JSON.parse(event.data);

                // ─── Session lifecycle events ───
                if (data.type === 'session_ready') {
                    sessionReady = true;
                    localStorage.setItem('yumii_last_session', data.session_id);
                    console.log("Session ready:", data.session_name, data.session_id);
                    document.getElementById('subtitle').innerText = "Listening...";
                    document.getElementById('ui-layer').style.opacity = 0;
                    return;
                }

                if (data.type === 'session_taken_over') {
                    document.getElementById('subtitle').innerText =
                        "Another tab took over this session. Refresh to reconnect.";
                    document.getElementById('ui-layer').style.opacity = 1;
                    sessionReady = false;
                    return;
                }

                if (data.type === 'session_switched') {
                    localStorage.setItem('yumii_last_session', data.session_id);
                    console.log("Switched to session:", data.session_name);
                    return;
                }

                if (data.type === 'session_renamed') {
                    console.log("Session renamed:", data.session_name);
                    return;
                }

                if (data.type === 'memory_cleared') {
                    console.log("Long-term memory cleared.");
                    return;
                }

                // ─── Interrupt ───
                if (data.type === 'interrupt') {
                    console.log("Interrupt received! Stopping audio.");
                    stopAllAudio();
                    document.getElementById('ui-layer').style.opacity = 0;
                    if (live2dModel) {
                        try { live2dModel.motion("idle"); } catch (e) {}
                    }
                    return;
                }

                // ─── Error ───
                if (data.error) {
                    const subtitle = document.getElementById('subtitle');
                    subtitle.innerText = `⚠️ ${data.error}`;
                    subtitle.style.color = '#ffb86c';
                    document.getElementById('ui-layer').style.opacity = 1;
                    setTimeout(() => {
                        document.getElementById('ui-layer').style.opacity = 0;
                        subtitle.style.color = '';
                    }, 5000);
                    return;
                }

                // ─── Streaming audio (CAMB.ai) ───
                if (data.type === 'audio_start') {
                    console.log("Starting streaming session:", data);
                    stopAllAudio();
                    isStreaming = true;
                    currentSampleRate = data.sampleRate || 24000;
                    nextPlayTime = audioContext.currentTime + 0.1;

                    document.getElementById('subtitle').innerText = data.text;
                    document.getElementById('ui-layer').style.opacity = 1;
                    setExpressionAndMotion(data.expression, data.motion);
                    startStreamingLipSync();
                    return;
                }

                if (data.type === 'audio_chunk') {
                    if (!isStreaming) return;
                    const float32Data = pcm16Base64ToFloat32(data.data);
                    if (float32Data.length === 0) return;

                    const audioBuffer = audioContext.createBuffer(1, float32Data.length, currentSampleRate);
                    audioBuffer.getChannelData(0).set(float32Data);

                    const source = audioContext.createBufferSource();
                    source.buffer = audioBuffer;

                    const gainNode = audioContext.createGain();
                    gainNode.gain.value = 0.7;

                    source.connect(gainNode);
                    gainNode.connect(analyser);
                    analyser.connect(audioContext.destination);

                    if (nextPlayTime < audioContext.currentTime) {
                        nextPlayTime = audioContext.currentTime + 0.05;
                    }

                    source.start(nextPlayTime);
                    scheduledSources.push(source);
                    nextPlayTime += audioBuffer.duration;

                    source.onended = () => {
                        const idx = scheduledSources.indexOf(source);
                        if (idx > -1) scheduledSources.splice(idx, 1);
                    };
                    return;
                }

                if (data.type === 'audio_end') {
                    console.log("Stream ended.");
                    const remainingTime = Math.max(0, nextPlayTime - audioContext.currentTime);
                    setTimeout(() => {
                        if (!isStreaming) return;
                        isStreaming = false;
                        document.getElementById('ui-layer').style.opacity = 0;
                    }, remainingTime * 1000 + 500);
                    return;
                }

                // ─── Legacy audio (ElevenLabs) ───
                if (data.text) {
                    console.log("Received AI payload (legacy block):", data);
                    document.getElementById('subtitle').innerText = data.text;
                    document.getElementById('ui-layer').style.opacity = 1;
                    setExpressionAndMotion(data.expression, data.motion);

                    if (data.audio) {
                        await playAudioAndSyncLips(data.audio);
                        setTimeout(() => {
                            document.getElementById('ui-layer').style.opacity = 0;
                        }, 500);
                    } else {
                        setTimeout(() => {
                            document.getElementById('ui-layer').style.opacity = 0;
                        }, 4000);
                    }
                }
            };

            socket.onclose = () => {
                console.log("Disconnected. Reconnecting in 3s...");
                sessionReady = false;
                setTimeout(initWebSocket, 3000);
            };
        }

        // ─── Helpers ───
        function setExpressionAndMotion(rawExp, rawMot) {
            rawExp = rawExp?.toLowerCase() || "normal";
            rawMot = rawMot?.toLowerCase() || "idle";

            const expression = EXPRESSION_MAP[rawExp];
            const motion = MOTION_MAP[rawMot] || "idle";

            document.getElementById('debug-info').innerText =
                `[LLM: ${rawExp} | ${rawMot}]\nExpression: ${expression || 'none'}\nMotion: ${motion}`;

            try {
                if (expression && live2dModel?.internalModel?.expressionManager) {
                    live2dModel.expression(expression);
                }
                if (motion && live2dModel) {
                    live2dModel.motion(motion);
                }
            } catch (e) {
                console.error("Motion/Expression error:", e);
                document.getElementById('debug-info').innerText += `\nError: ${e.message}`;
            }
        }

        function pcm16Base64ToFloat32(base64) {
            const binary = window.atob(base64);
            const len = binary.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binary.charCodeAt(i);
            }

            let totalBytes = new Uint8Array(audioByteRemainder.length + bytes.length);
            totalBytes.set(audioByteRemainder);
            totalBytes.set(bytes, audioByteRemainder.length);

            const numFullSamples = Math.floor(totalBytes.length / 2);
            const validBytes = totalBytes.subarray(0, numFullSamples * 2);
            audioByteRemainder = totalBytes.subarray(numFullSamples * 2);

            const int16 = new Int16Array(validBytes.buffer, validBytes.byteOffset, numFullSamples);
            const float32 = new Float32Array(int16.length);
            for (let i = 0; i < int16.length; i++) {
                float32[i] = int16[i] / 32768.0;
            }
            return float32;
        }

        let streamingLipSyncReqId = null;
        function startStreamingLipSync() {
            if (streamingLipSyncReqId) return;
            const pcmData = new Float32Array(analyser.fftSize);

            const loop = () => {
                if (!live2dModel || !isStreaming) {
                    if (live2dModel) {
                        live2dModel.internalModel.coreModel.setParameterValueById("ParamMouthOpenY", 0);
                    }
                    streamingLipSyncReqId = null;
                    return;
                }

                analyser.getFloatTimeDomainData(pcmData);
                let sumSquares = 0.0;
                for (const amplitude of pcmData) {
                    sumSquares += amplitude * amplitude;
                }
                const rms = Math.sqrt(sumSquares / pcmData.length);
                const mouthOpen = Math.min(1.0, rms * 15.0);
                live2dModel.internalModel.coreModel.setParameterValueById("ParamMouthOpenY", mouthOpen);
                streamingLipSyncReqId = requestAnimationFrame(loop);
            };

            streamingLipSyncReqId = requestAnimationFrame(loop);
        }

        async function playAudioAndSyncLips(base64Audio) {
            if (!audioContext) return;

            const binaryString = window.atob(base64Audio);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }

            const audioBuffer = await audioContext.decodeAudioData(bytes.buffer);
            const source = audioContext.createBufferSource();
            source.buffer = audioBuffer;
            currentAudioSource = source;

            source.connect(analyser);
            analyser.connect(audioContext.destination);

            source.onended = () => {
                if (currentAudioSource === source) {
                    currentAudioSource = null;
                }
            };

            source.start(0);

            const pcmData = new Float32Array(analyser.fftSize);
            const lipSyncLoop = () => {
                if (!live2dModel) return;
                analyser.getFloatTimeDomainData(pcmData);
                let sumSquares = 0.0;
                for (const amplitude of pcmData) {
                    sumSquares += amplitude * amplitude;
                }
                const rms = Math.sqrt(sumSquares / pcmData.length);
                const mouthOpen = Math.min(1.0, rms * 15.0);
                live2dModel.internalModel.coreModel.setParameterValueById("ParamMouthOpenY", mouthOpen);
                if (source.playbackRate.value > 0) {
                    requestAnimationFrame(lipSyncLoop);
                }
            };
            requestAnimationFrame(lipSyncLoop);

            return new Promise(resolve => {
                source.onended = () => {
                    live2dModel.internalModel.coreModel.setParameterValueById("ParamMouthOpenY", 0);
                    resolve();
                };
            });
        }

        // ─── Startup ───
        document.getElementById('btn-start').addEventListener('click', async () => {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 512;

            document.getElementById('btn-start').style.display = 'none';
            await fetchConfig();
            await initMicrophone();
            await initLive2D();
            initWebSocket();
            showSessionPicker();
        });

        // Window resize
        window.addEventListener('resize', () => {
            if (live2dModel) {
                const unscaledWidth = live2dModel.internalModel.width;
                const unscaledHeight = live2dModel.internalModel.height;
                const scaleX = window.innerWidth / unscaledWidth;
                const scaleY = window.innerHeight / unscaledHeight;
                const scale = Math.min(scaleX, scaleY) * 0.95;
                live2dModel.scale.set(scale);
                live2dModel.x = (window.innerWidth - (unscaledWidth * scale)) / 2;
                live2dModel.y = (window.innerHeight - (unscaledHeight * scale));
            }
        });
    </script>
</body>

</html>
