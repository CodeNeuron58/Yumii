<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yumii Live2D Console</title>
    <!-- Load PixiJS -->
    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/6.5.2/browser/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/cubism4.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1e1e2e;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            height: 100vh;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        #ui-layer {
            position: absolute;
            z-index: 10;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            width: 350px;
            max-width: 80vw;
            max-height: 80vh;
            overflow-y: auto;
            text-align: left;
            background: rgba(0, 0, 0, 0.6);
            padding: 25px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        #subtitle {
            font-size: 20px;
            line-height: 1.5;
            font-weight: 500;
        }

        #btn-start {
            position: absolute;
            z-index: 20;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 30px;
            font-size: 20px;
            background-color: #ff79c6;
            color: #282a36;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 121, 198, 0.4);
        }

        #btn-start:hover {
            background-color: #ff92d0;
        }

        #debug-info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #0f0;
            font-family: monospace;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 5px;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>

<body>

    <div id="debug-info">Waiting for backend data...</div>
    <div id="canvas-container"></div>

    <button id="btn-start">Connect &amp; Start Audio Context</button>

    <div id="ui-layer">
        <div id="subtitle">Connecting to Yumii...</div>
    </div>

    <script>
        // --- LIVE2D MODEL CONFIGURATION ---
        // Yumii does NOT bundle a Live2D model. You must supply your own
        // Cubism 4 compatible .model3.json file in ~/.yumii/avatar/ and
        // point the path below at its filename. See
        // docs/content/customization/adding-avatars.mdx for the full
        // guide, including which sites host legal models.
        //
        // If this URL 404s, the page will fall back to a "no avatar
        // loaded" message rather than crashing the rest of the UI.
        const modelUrl = "/Yumii_Avatar/your-model.model3.json";
        let live2dModel = null;
        let audioContext = null;
        let analyser = null;
        let socket = null;
        let currentAudioSource = null;
        let micStream = null;
        let micProcessor = null;
        let audioByteRemainder = new Uint8Array(0); // Buffer for odd-sized chunks

        // --- EMOTION/MOTION HANDLING ---
        // Map LLM expression labels to your model's expression file basenames.
        // Keys are the abstract labels the LLM can emit; values are the
        // exact basenames of the .exp3.json files in your model folder
        // (without the extension), or null for the neutral face.
        const EXPRESSION_MAP = {
            "smile": "smile",
            "angry": "angry",
            "sad": "sad",
            "surprise": "surprise",
            "scared": "scared",
            "shy": "shy",
            "normal": null
        };

        // Map LLM motion labels to your model's motion group names.
        // Keys are the abstract labels the LLM can emit; values are the
        // motion group names declared in your .model3.json file under
        // "Motions". If your model has no matching group, Yumii falls
        // back to "idle".
        const MOTION_MAP = {
            "nod": "nod",
            "shakehead": "shakehead",
            "tilthead": "nod",
            "fidget": "idle",
            "forward": "idle",
            "lookaway": "lookaway",
            "greeting": "greeting",
            "idle": "idle"
        };

        // --- PixiJS & Live2D Setup ---
        const app = new PIXI.Application({
            view: document.createElement('canvas'),
            transparent: true,
            autoDensity: true,
            resizeTo: window
        });

        // Prevent all global Pixi interactions from propagating to elements
        app.renderer.plugins.interaction.destroy();

        document.getElementById('canvas-container').appendChild(app.view);

        async function initLive2D() {
            try {
                // Load the model
                live2dModel = await PIXI.live2d.Live2DModel.from(modelUrl);
                app.stage.addChild(live2dModel);

                const unscaledWidth = live2dModel.internalModel.width;
                const unscaledHeight = live2dModel.internalModel.height;
                const scaleX = window.innerWidth / unscaledWidth;
                const scaleY = window.innerHeight / unscaledHeight;

                // Scale so that it strictly fits within the screen height
                const scale = Math.min(scaleX, scaleY) * 0.95;
                live2dModel.scale.set(scale);

                // Center Horizontally, Align to Bottom Vertically
                live2dModel.x = (window.innerWidth - (unscaledWidth * scale)) / 2;
                live2dModel.y = (window.innerHeight - (unscaledHeight * scale));

                // Properly disable mouse tracking in pixi-live2d-display
                live2dModel.pointerTracking = false;

                // If it STILL tracks, force the focus controller to center
                if (live2dModel.internalModel.focusController) {
                    live2dModel.internalModel.focusController.focus(0, 0);
                }

                console.log("Model loaded successfully.");

                // Play initial startup motion
                try {
                    live2dModel.motion("idle");
                } catch (e) {
                    console.error("Failed to play startup motion:", e);
                }

            } catch (err) {
                console.error("Error loading Live2D model:", err);
                const sub = document.getElementById('subtitle');
                sub.innerHTML =
                    "⚠️ No avatar loaded.<br>" +
                    "Drop a Cubism 4 <code>.model3.json</code> into <code>~/.yumii/avatar/</code> " +
                    "and update <code>modelUrl</code> in <code>index.html</code>.<br>" +
                    "See the <strong>Adding Avatars</strong> guide in the docs. " +
                    "Voice + LLM still work without an avatar.";
                document.getElementById('ui-layer').style.opacity = 1;
                document.getElementById('debug-info').innerText =
                    "Live2D model not found. Yumii will speak through your speakers; only the animated avatar is missing.";
            }
        }

        // --- WebSocket & Lip Sync Setup ---
        async function initMicrophone() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    }
                });
                micStream = stream;

                // Create a dedicated AudioContext for recording at 16kHz
                const recContext = new (window.AudioContext || window.webkitAudioContext)({
                    sampleRate: 16000,
                });

                const source = recContext.createMediaStreamSource(stream);

                // ScriptProcessorNode for raw PCM capture
                // 4096 samples is about 256ms at 16kHz
                micProcessor = recContext.createScriptProcessor(4096, 1, 1);

                micProcessor.onaudioprocess = (e) => {
                    if (!socket || socket.readyState !== WebSocket.OPEN) return;

                    const inputData = e.inputBuffer.getChannelData(0);
                    // Convert Float32 (-1 to 1) to Int16 (PCM)
                    const pcm16 = new Int16Array(inputData.length);
                    for (let i = 0; i < inputData.length; i++) {
                        const s = Math.max(-1, Math.min(1, inputData[i]));
                        pcm16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                    }
                    socket.send(pcm16.buffer);
                };

                source.connect(micProcessor);
                micProcessor.connect(recContext.destination);

                document.getElementById('debug-info').innerText += `\n🎙️ Mic Active (16kHz)`;
                console.log("Microphone initialized and streaming.");
            } catch (err) {
                console.error("Error initializing microphone:", err);
                document.getElementById('debug-info').innerText += `\n❌ Mic Error: ${err.message}`;
            }
        }

        function initWebSocket() {

            // Use window.location.host so this works on any port or host,
            // not just hardcoded localhost:8000.
            socket = new WebSocket(`ws://${window.location.host}/ws`);
            socket.binaryType = 'arraybuffer';

            socket.onopen = () => {
                console.log("Connected to Python backend.");
                document.getElementById('subtitle').innerText = "Listening...";
                document.getElementById('ui-layer').style.opacity = 0; // Hide until spoken to
            };


            let nextPlayTime = 0;
            let isStreaming = false;
            let scheduledSources = [];
            let currentSampleRate = 24000;

            function stopAllAudio() {
                if (currentAudioSource) {
                    try { currentAudioSource.stop(); } catch (e) {}
                    currentAudioSource = null;
                }
                scheduledSources.forEach(src => {
                    try { src.stop(); } catch (e) {}
                });
                scheduledSources = [];
                isStreaming = false;
                nextPlayTime = 0;
                
                if (live2dModel) {
                    live2dModel.internalModel.coreModel.setParameterValueById('ParamMouthOpenY', 0);
                }
            }

            socket.onmessage = async (event) => {
                const data = JSON.parse(event.data);

                // Handle global interrupt (barge-in)
                if (data.type === "interrupt") {
                    console.log("Interrupt received! Stopping audio.");
                    stopAllAudio();
                    
                    document.getElementById('ui-layer').style.opacity = 0;
                    if (live2dModel) {
                        try {
                            live2dModel.motion("idle");
                        } catch (e) {}
                    }
                    return;
                }

                // Handle TTS / backend errors — show visibly instead of silent failure
                if (data.error) {
                    const subtitle = document.getElementById('subtitle');
                    subtitle.innerText = `⚠️ ${data.error}`;
                    subtitle.style.color = '#ffb86c';
                    document.getElementById('ui-layer').style.opacity = 1;
                    setTimeout(() => {
                        document.getElementById('ui-layer').style.opacity = 0;
                        subtitle.style.color = '';
                    }, 5000);
                    return;
                }
                
                // ─── STREAMING AUDIO HANDLERS (CAMB.ai) ──────────────────────────────────
                if (data.type === "audio_start") {
                    console.log("Starting streaming session:", data);
                    stopAllAudio();
                    isStreaming = true;
                    currentSampleRate = data.sampleRate || 24000;
                    nextPlayTime = audioContext.currentTime + 0.1; // Small buffer delay
                    
                    document.getElementById('subtitle').innerText = data.text;
                    document.getElementById('ui-layer').style.opacity = 1;
                    setExpressionAndMotion(data.expression, data.motion);
                    
                    startStreamingLipSync();
                    return;
                }
                
                if (data.type === "audio_chunk") {
                    if (!isStreaming) return; // Discard if interrupted
                    
                    const float32Data = pcm16Base64ToFloat32(data.data);
                    if (float32Data.length === 0) return;
                    
                    const audioBuffer = audioContext.createBuffer(1, float32Data.length, currentSampleRate);
                    audioBuffer.getChannelData(0).set(float32Data);
                    
                    const source = audioContext.createBufferSource();
                    source.buffer = audioBuffer;
                    
                    // Reduce volume slightly to prevent mic bleed (echo)
                    const gainNode = audioContext.createGain();
                    gainNode.gain.value = 0.7;
                    
                    source.connect(gainNode);
                    gainNode.connect(analyser);
                    analyser.connect(audioContext.destination);
                    
                    // If we fell behind, catch up
                    if (nextPlayTime < audioContext.currentTime) {
                        nextPlayTime = audioContext.currentTime + 0.05;
                    }
                    
                    source.start(nextPlayTime);
                    scheduledSources.push(source);
                    nextPlayTime += audioBuffer.duration;
                    
                    // Cleanup array when done playing
                    source.onended = () => {
                        const idx = scheduledSources.indexOf(source);
                        if (idx > -1) scheduledSources.splice(idx, 1);
                    };
                    return;
                }
                
                if (data.type === "audio_end") {
                    console.log("Stream ended.");
                    // The lip-sync loop will self-terminate when currentTime > nextPlayTime
                    
                    const remainingTime = Math.max(0, nextPlayTime - audioContext.currentTime);
                    setTimeout(() => {
                        if (!isStreaming) return; // Was interrupted
                        isStreaming = false;
                        document.getElementById('ui-layer').style.opacity = 0;
                    }, remainingTime * 1000 + 500);
                    
                    return;
                }

                // ─── LEGACY AUDIO HANDLER (ElevenLabs) ───────────────────────────────────
                if (data.text) {
                    console.log("Received AI payload (legacy block):", data);

                    // 1. Show Subtitle
                    document.getElementById('subtitle').innerText = data.text;
                    document.getElementById('ui-layer').style.opacity = 1;

                    setExpressionAndMotion(data.expression, data.motion);

                    // 3. Play Audio and Auto-Lip Sync
                    if (data.audio) {
                        await playAudioAndSyncLips(data.audio);

                        setTimeout(() => {
                            document.getElementById('ui-layer').style.opacity = 0;
                        }, 500);
                    } else {
                        // Text received but no audio (TTS may have failed)
                        setTimeout(() => {
                            document.getElementById('ui-layer').style.opacity = 0;
                        }, 4000);
                    }
                }
            };

            socket.onclose = () => {
                console.log("Disconnected. Reconnecting in 3s...");
                setTimeout(initWebSocket, 3000);
            };
        }

        function setExpressionAndMotion(rawExp, rawMot) {
            rawExp = rawExp?.toLowerCase() || "normal";
            rawMot = rawMot?.toLowerCase() || "idle";
            
            const expression = EXPRESSION_MAP[rawExp];
            const motion = MOTION_MAP[rawMot] || "idle";
            
            document.getElementById('debug-info').innerText = `[LLM: ${rawExp} | ${rawMot}]\nExpression: ${expression || 'none'}\nMotion: ${motion}`;
            
            try {
                if (expression && live2dModel?.internalModel?.expressionManager) {
                    live2dModel.expression(expression);
                }
                if (motion && live2dModel) {
                    live2dModel.motion(motion);
                }
            } catch (e) { 
                console.error("Motion/Expression error:", e);
                document.getElementById('debug-info').innerText += `\nError: ${e.message}`;
            }
        }

        function pcm16Base64ToFloat32(base64) {
            const binary = window.atob(base64);
            const len = binary.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binary.charCodeAt(i);
            }

            // Concatenate with any remainder from the previous chunk
            let totalBytes = new Uint8Array(audioByteRemainder.length + bytes.length);
            totalBytes.set(audioByteRemainder);
            totalBytes.set(bytes, audioByteRemainder.length);

            // We need an even number of bytes for Int16Array (2 bytes per sample)
            const numFullSamples = Math.floor(totalBytes.length / 2);
            const validBytes = totalBytes.subarray(0, numFullSamples * 2);

            // Store the remainder for the next chunk
            audioByteRemainder = totalBytes.subarray(numFullSamples * 2);

            const int16 = new Int16Array(validBytes.buffer, validBytes.byteOffset, numFullSamples);
            const float32 = new Float32Array(int16.length);
            for (let i = 0; i < int16.length; i++) {
                float32[i] = int16[i] / 32768.0;
            }
            return float32;
        }

        let streamingLipSyncReqId = null;
        function startStreamingLipSync() {
            if (streamingLipSyncReqId) return;
            
            const pcmData = new Float32Array(analyser.fftSize);
            
            const loop = () => {
                if (!live2dModel || !isStreaming) {
                    if (live2dModel) {
                        live2dModel.internalModel.coreModel.setParameterValueById("ParamMouthOpenY", 0);
                    }
                    streamingLipSyncReqId = null;
                    return;
                }

                analyser.getFloatTimeDomainData(pcmData);
                let sumSquares = 0.0;
                for (const amplitude of pcmData) {
                    sumSquares += amplitude * amplitude;
                }
                const rms = Math.sqrt(sumSquares / pcmData.length);

                const mouthOpen = Math.min(1.0, rms * 15.0);
                live2dModel.internalModel.coreModel.setParameterValueById("ParamMouthOpenY", mouthOpen);

                streamingLipSyncReqId = requestAnimationFrame(loop);
            };
            
            streamingLipSyncReqId = requestAnimationFrame(loop);
        }

        async function playAudioAndSyncLips(base64Audio) {
            if (!audioContext) return;

            const binaryString = window.atob(base64Audio);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }

            const audioBuffer = await audioContext.decodeAudioData(bytes.buffer);
            const source = audioContext.createBufferSource();
            source.buffer = audioBuffer;
            currentAudioSource = source;

            source.connect(analyser);
            analyser.connect(audioContext.destination);

            source.onended = () => {
                if (currentAudioSource === source) {
                    currentAudioSource = null;
                }
            };

            source.start(0);

            const pcmData = new Float32Array(analyser.fftSize);

            const lipSyncLoop = () => {
                if (!live2dModel) return;

                analyser.getFloatTimeDomainData(pcmData);
                let sumSquares = 0.0;
                for (const amplitude of pcmData) {
                    sumSquares += amplitude * amplitude;
                }
                const rms = Math.sqrt(sumSquares / pcmData.length);

                const mouthOpen = Math.min(1.0, rms * 15.0);
                live2dModel.internalModel.coreModel.setParameterValueById("ParamMouthOpenY", mouthOpen);

                if (source.playbackRate.value > 0) {
                    requestAnimationFrame(lipSyncLoop);
                }
            };

            requestAnimationFrame(lipSyncLoop);

            return new Promise(resolve => {
                source.onended = () => {
                    live2dModel.internalModel.coreModel.setParameterValueById("ParamMouthOpenY", 0);
                    resolve();
                };
            });
        }

        document.getElementById('btn-start').addEventListener('click', async () => {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 512;

            document.getElementById('btn-start').style.display = 'none';
            await initMicrophone();
            initLive2D();
            initWebSocket();
        });

        // Window resize handler
        window.addEventListener('resize', () => {
            if (live2dModel) {
                const unscaledWidth = live2dModel.internalModel.width;
                const unscaledHeight = live2dModel.internalModel.height;
                const scaleX = window.innerWidth / unscaledWidth;
                const scaleY = window.innerHeight / unscaledHeight;

                const scale = Math.min(scaleX, scaleY) * 0.95;
                live2dModel.scale.set(scale);

                live2dModel.x = (window.innerWidth - (unscaledWidth * scale)) / 2;
                live2dModel.y = (window.innerHeight - (unscaledHeight * scale));
            }
        });
    </script>
</body>

</html>
